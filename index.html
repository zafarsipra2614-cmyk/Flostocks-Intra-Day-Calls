<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intra Day Calls — FLOSTOCKS</title>
<style>
/* =========================================================
   FLOSTOCKS — INTRA DAY CALLS
   Light (white & green) trading dashboard.
   Table is the primary element (on top).
   Blue-highlighted row = priority opportunity from research.
   ========================================================= */

/* ---------- Design tokens ---------- */
:root{
  --bg:#f3f7f4;
  --card:#ffffff;
  --row:#ffffff;
  --row-alt:#f1f8f3;
  --text:#0f1a14;
  --muted:#5b6b62;
  --green:#16a34a;
  --green-deep:#0f7a3d;
  --green-soft:#dcfce7;
  --red:#dc2626;
  --yellow:#ca8a04;
  --blue:#2563eb;
  --blue-soft:#e5efff;
  --border:#e3ece6;
  --radius:16px;
  --shadow:0 8px 26px rgba(16,64,40,.08);
  --rs:1;                 /* row scale — set by JS so all rows fit one screen */
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);color:var(--text);
  font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
  padding:clamp(12px,1.4vw,26px);
  height:100vh;overflow:hidden;                 /* lock to one screen, never scroll */
  display:flex;flex-direction:column;           /* header / summary / table / footer stacked */
  -webkit-font-smoothing:antialiased;
}

/* ---------- Header ---------- */
.header{
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:20px;
  padding:clamp(10px,1.1vw,20px) clamp(18px,1.8vw,30px);
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow);flex:0 0 auto;
}
.brand{display:flex;align-items:center}
.brand img{height:clamp(46px,4vw,74px);width:auto;display:block}   /* FLOSTOCKS logo */

.title-block{text-align:center}
.title{font-size:clamp(22px,2.3vw,44px);font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text)}
.title .accent{color:var(--green)}
.title-date{margin-top:4px;font-size:clamp(13px,1.1vw,20px);color:var(--muted);font-weight:600;letter-spacing:.5px}

.head-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.clock{font-size:clamp(24px,2.3vw,44px);font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:2px;color:var(--text)}
.status{display:flex;align-items:center;gap:9px;font-size:clamp(12px,.95vw,16px);font-weight:800;letter-spacing:1px;padding:6px 14px;border-radius:999px;border:1px solid var(--border)}
.dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto}
.status.live{color:var(--green);background:var(--green-soft)}
.status.live .dot{background:var(--green);animation:pulse 1.8s infinite}
.status.down{color:var(--red);background:#fde8e8}
.status.down .dot{background:var(--red)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(22,163,74,.55)}70%{box-shadow:0 0 0 11px rgba(22,163,74,0)}100%{box-shadow:0 0 0 0 rgba(22,163,74,0)}}

/* ---------- One-line summary strip ---------- */
.summary{
  display:flex;align-items:center;gap:clamp(18px,2.4vw,44px);flex-wrap:wrap;
  margin:clamp(8px,1vw,14px) 0;padding:clamp(8px,.9vw,14px) clamp(18px,1.8vw,28px);
  background:var(--card);border:1px solid var(--border);border-radius:999px;
  box-shadow:var(--shadow);font-size:clamp(14px,1.2vw,20px);flex:0 0 auto;
}
.summary .item{display:flex;align-items:baseline;gap:8px}
.summary .item b{font-size:clamp(20px,1.9vw,32px);font-weight:800;font-variant-numeric:tabular-nums}
.summary .lbl{color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-size:clamp(11px,.9vw,14px);font-weight:700}
.summary .total b{color:var(--text)}
.summary .buy b{color:var(--green)}
.summary .short b{color:var(--red)}
.summary .hit b{color:var(--green)}
.summary .prio b{color:var(--blue)}
.summary .sep{width:1px;align-self:stretch;background:var(--border)}

/* ---------- Table ---------- */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:clamp(10px,1.1vw,20px) clamp(14px,1.4vw,24px);position:relative;
  flex:1 1 auto;min-height:0;overflow:hidden;}     /* take all leftover height, no scroll */
table{width:100%;border-collapse:separate;border-spacing:0 calc(9px * var(--rs))}
thead th{text-align:left;font-size:calc(clamp(12px,1vw,18px) * var(--rs));color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;padding:calc(5px * var(--rs)) clamp(14px,1.4vw,24px)}
tbody td{font-size:calc(clamp(16px,1.5vw,28px) * var(--rs));font-weight:600;padding:calc(clamp(10px,1.3vw,20px) * var(--rs)) clamp(14px,1.4vw,24px);background:var(--row);border-top:1px solid var(--border);border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}
tbody tr td:first-child{border-left:1px solid var(--border);border-top-left-radius:14px;border-bottom-left-radius:14px}
tbody tr td:last-child{border-right:1px solid var(--border);border-top-right-radius:14px;border-bottom-right-radius:14px}
tbody tr:nth-child(even) td{background:var(--row)}   /* normal rows stay plain white */
tbody tr{transition:transform .25s ease, box-shadow .25s ease}
tbody tr:hover{transform:translateY(-2px)}
tbody tr:hover td{box-shadow:0 10px 24px rgba(16,64,40,.12)}
.scrip{font-weight:800;letter-spacing:.5px}

/* badges */
.badge{display:inline-block;padding:calc(5px * var(--rs)) calc(15px * var(--rs));border-radius:999px;font-size:calc(clamp(11px,1.05vw,18px) * var(--rs));font-weight:800;letter-spacing:1px}
.badge.buy{background:var(--green-soft);color:var(--green);border:1px solid rgba(22,163,74,.4)}
.badge.short{background:#fde8e8;color:var(--red);border:1px solid rgba(220,38,38,.4)}
.badge.open{background:#fef4d6;color:var(--yellow);border:1px solid rgba(202,138,4,.45)}
.badge.done{background:var(--green-soft);color:var(--green);border:1px solid rgba(22,163,74,.5)}
.badge.priority{background:var(--blue-soft);color:var(--blue);border:1px solid rgba(37,99,235,.45);margin-left:10px;font-size:clamp(10px,.85vw,14px);padding:4px 12px}

/* completed row = SOLID green, white text (no shadows, aligned to normal rows) */
tr.completed td{
  background:linear-gradient(180deg, rgba(34,197,94,.97), rgba(15,122,61,.97))!important;
  color:#ffffff!important;
  border-color:rgba(22,163,74,.55)!important;                 /* recolour existing 1px border only */
  box-shadow:none!important;                                  /* no shadows */
  backdrop-filter:blur(6px) saturate(1.15);
  -webkit-backdrop-filter:blur(6px) saturate(1.15);
  transition:background .6s ease, color .6s ease;             /* smooth fade to green/white */
}
tr.completed .scrip{color:#ffffff!important}
tr.completed td:first-child{box-shadow:none!important}
tr.completed .badge{background:rgba(255,255,255,.20)!important;color:#ffffff!important;border-color:rgba(255,255,255,.55)!important}

/* PRIORITY row = blue glass highlight (research flagged, cater first) */
tr.priority td{
  background:linear-gradient(180deg, rgba(96,150,255,.20), rgba(37,99,235,.14))!important;
  border-color:rgba(37,99,235,.45)!important;                 /* recolour existing 1px border only */
  box-shadow:inset 0 1px 0 rgba(255,255,255,.55);
  backdrop-filter:blur(6px) saturate(1.15);
  -webkit-backdrop-filter:blur(6px) saturate(1.15);
}
/* left accent as INSET shadow instead of border-left, so nothing shifts */
tr.priority td:first-child{box-shadow:inset 0 1px 0 rgba(255,255,255,.55), inset 5px 0 0 var(--blue)}
tr.priority .scrip{color:var(--blue)}
/* if a priority call is hit, it takes the solid-green completed styling above */

/* new row slide-in */
@keyframes slideIn{from{opacity:0;transform:translateX(70px)}to{opacity:1;transform:translateX(0)}}
tr.newrow{animation:slideIn .55s ease both}
tr.newhighlight td{box-shadow:inset 0 0 0 2px rgba(22,163,74,.5)}

/* FALSE -> TRUE flash, twice */
@keyframes hitFlash{0%{background:#fff;color:#0b0b0b}25%{background:#86efac;color:#0b0b0b}50%{background:var(--green-deep);color:#fff}75%{background:#86efac;color:#0b0b0b}100%{background:var(--green-deep);color:#fff}}
tr.flash td{animation:hitFlash 1.1s ease 2}

/* footer */
.footer{display:flex;justify-content:space-between;align-items:center;margin-top:clamp(8px,1vw,16px);color:var(--muted);font-size:clamp(12px,1vw,17px);padding:0 6px;flex:0 0 auto}
.footer .ago{color:var(--text);font-weight:700}

/* loading / empty */
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;background:rgba(255,255,255,.7);backdrop-filter:blur(2px);border-radius:var(--radius);z-index:5}
.spinner{width:54px;height:54px;border-radius:50%;border:5px solid rgba(22,163,74,.18);border-top-color:var(--green);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay .msg{color:var(--muted);letter-spacing:1px;font-size:clamp(14px,1.1vw,20px)}
.empty{text-align:center;color:var(--muted);padding:60px 0;font-size:clamp(16px,1.4vw,24px)}
.hidden{display:none!important}

@media (max-width:900px){
  .header{grid-template-columns:1fr;justify-items:center;text-align:center}
  .head-right{align-items:center}
  .summary{justify-content:center}
}
</style>
</head>

let previous = {};
let firstLoad = true;
let lastFetchTime = null;

/* ---------- HELPERS ---------- */
const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,"0");
function todayLabel(){
  const d=new Date();
  const m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];
  return pad(d.getDate())+" "+m+" "+d.getFullYear();
}
const normDate = s => String(s||"").trim().toLowerCase().replace(/\s+/g," ");
const truthy = v => v===true || String(v).trim().toLowerCase()==="true";
/* format a price: pure number -> 2 decimals; range like "12-13" -> each side to 2dp; anything else -> as typed */
function fmtPrice(v){
  const s=String(v==null?"":v).trim();
  if(s==="") return "-";
  if(!isNaN(Number(s))) return Number(s).toFixed(2);            // single number
  const m=s.match(/^(\d*\.?\d+)\s*[-–to]+\s*(\d*\.?\d+)$/i);    // range e.g. 12-13 / 12 - 13 / 12 to 13
  if(m) return Number(m[1]).toFixed(2)+" - "+Number(m[2]).toFixed(2);
  return s;                                                     // fallback: show whatever was typed
}

/* ---------- CLOCK ---------- */
function tickClock(){
  const d=new Date();
  $("clock").textContent=pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
  $("headerDate").textContent=d.toLocaleDateString(undefined,{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}
setInterval(tickClock,1000); tickClock();

/* ---------- "Updated X seconds ago" ---------- */
function tickAgo(){
  if(!lastFetchTime) return;
  const s=Math.round((Date.now()-lastFetchTime)/1000);
  $("agoText").textContent = s<2 ? "Updated just now" : s<60 ? "Updated "+s+" seconds ago" : "Updated "+Math.floor(s/60)+" min ago";
}
setInterval(tickAgo,1000);

/* ---------- BELL (synthesised, muted when tab inactive) ---------- */
let audioCtx=null;
function playBell(){
  if(document.hidden) return;
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    const t=audioCtx.currentTime;
    [880,1320].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type="sine";o.frequency.value=f;
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(i?0.15:0.3,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,t+1.4);
      o.connect(g).connect(audioCtx.destination);o.start(t);o.stop(t+1.5);
    });
  }catch(e){}
}

/* ---------- CONNECTION STATUS ---------- */
function setStatus(live){
  const el=$("conn");
  el.classList.toggle("live",live);el.classList.toggle("down",!live);
  $("connText").textContent=live?"LIVE":"CONNECTION LOST";
}

/* ---------- SUMMARY ---------- */
function updateSummary(rows){
  $("cTotal").textContent=rows.length;
  $("cBuy").textContent=rows.filter(r=>r.direction.toUpperCase()==="BUY").length;
  $("cShort").textContent=rows.filter(r=>r.direction.toUpperCase()==="SHORT").length;
  $("cHit").textContent=rows.filter(r=>r.hit===true).length;
  $("cPrio").textContent=rows.filter(r=>r.priority===true && r.hit!==true).length;
}

/* ---------- ROW ---------- */
function buildRow(r){
  const tr=document.createElement("tr");
  if(r.hit) tr.classList.add("completed");
  if(r.priority && !r.hit) tr.classList.add("priority");   // blue highlight

  const dir=r.direction.toUpperCase();
  const dirBadge = dir==="BUY" ? '<span class="badge buy">BUY</span>' : '<span class="badge short">SHORT</span>';
  const statusBadge = r.hit ? '<span class="badge done">TARGET HIT</span>' : '<span class="badge open">OPEN</span>';
  const prioTag = (r.priority && !r.hit) ? '<span class="badge priority">PRIORITY</span>' : '';

  tr.innerHTML =
    '<td class="scrip">'+r.scrip+prioTag+'</td>'+
    '<td>'+dirBadge+'</td>'+
    '<td>'+fmtPrice(r.entry)+'</td>'+
    '<td>'+fmtPrice(r.target)+'</td>'+
    '<td>'+statusBadge+'</td>';
  return tr;
}

/* ---------- SORTING: priority -> open -> completed ---------- */
function rank(r){ if(r.hit) return 2; if(r.priority) return 0; return 1; }
function sortRows(rows){
  return [...rows].sort((a,b)=>{
    const ra=rank(a),rb=rank(b);
    if(ra!==rb) return ra-rb;
    return a.scrip.localeCompare(b.scrip);
  });
}

/* ---------- RENDER ---------- */
function render(rows){
  const tbody=$("tbody");tbody.innerHTML="";
  sortRows(rows).forEach(r=>{
    const key=r.date+"|"+r.scrip+"|"+r.direction;
    const tr=buildRow(r);
    const prev=previous[key];
    if(!firstLoad){
      if(prev===undefined){
        tr.classList.add("newrow","newhighlight");
        setTimeout(()=>tr.classList.remove("newhighlight"),3000);
      }else if(prev===false && r.hit===true){
        tr.classList.add("flash");playBell();
      }
    }
    tbody.appendChild(tr);
  });
  $("empty").classList.toggle("hidden", rows.length>0);
  const next={};
  rows.forEach(r=>{ next[r.date+"|"+r.scrip+"|"+r.direction]=r.hit===true; });
  previous=next; firstLoad=false;
  updateSummary(rows);
  fitToScreen();                 // shrink rows so everything fits one screen
}

/* ---------- FIT TO SCREEN (no scrolling on the TV) ----------
   Reduces the row-scale variable until the table no longer
   overflows its panel. Runs after every render and on resize. */
function fitToScreen(){
  const panel=document.querySelector(".panel");
  if(!panel) return;
  let scale=1, guard=0;
  document.documentElement.style.setProperty("--rs",scale);
  // shrink in small steps until content fits (or we hit a sensible floor)
  while(panel.scrollHeight>panel.clientHeight && scale>0.18 && guard<80){
    scale-=0.025; guard++;
    document.documentElement.style.setProperty("--rs",scale.toFixed(3));
  }
}
window.addEventListener("resize", fitToScreen);

/* ---------- FETCH ---------- */
async function fetchData(){
  try{
    const res=await fetch(DATA_URL,{cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data=await res.json();
    const today=normDate(todayLabel());
    const rows=(Array.isArray(data)?data:[])
      .filter(r=>normDate(r.date)===today)
      .map(r=>({...r, hit:truthy(r.hit), priority:truthy(r.priority)}));
    render(rows);
    setStatus(true);
    lastFetchTime=Date.now();
    const d=new Date();
    $("lastUpdated").textContent=pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
    tickAgo();
  }catch(err){
    console.error("Fetch failed:",err);
    setStatus(false);
  }finally{
    $("loading").classList.add("hidden");
  }
}

/* ---------- BOOTSTRAP ---------- */
fetchData();
setInterval(fetchData,REFRESH_MS);
</script>
</body>
</html>
